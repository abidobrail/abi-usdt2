<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABI do Brasil - Exchange</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ABI Brasil">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .accent-border { border-left: 4px solid #eab308; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-md mb-6 text-center pt-6">
        <h1 class="text-3xl font-extrabold text-white tracking-tighter">ABI <span class="text-yellow-500">do Brasil</span></h1>
        <div class="flex justify-center gap-2 mt-2">
            <span class="bg-slate-800 text-[10px] px-2 py-1 rounded text-slate-400 font-bold uppercase tracking-widest">Fee: 0.9%</span>
            <span class="bg-emerald-900/30 text-[10px] px-2 py-1 rounded text-emerald-400 font-bold uppercase tracking-widest">Lucro: 1.0%</span>
        </div>
    </header>

    <main class="w-full max-w-md space-y-4">
        <section class="glass-card p-6 rounded-3xl shadow-2xl relative overflow-hidden">
            <div class="space-y-4 relative z-10">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-wider">¿Qué entrega el cliente?</label>
                    <select id="currency" onchange="calcular()" class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-white text-lg font-bold outline-none focus:border-yellow-500 transition-all">
                        <option value="BRL">Reais (BRL) → Compra USDT</option>
                        <option value="VES">Bolívares (VES) → Compra USDT</option>
                        <option value="USDT">USDT → Recibe Local</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Precio Spot</label>
                        <input type="number" id="spotPrice" oninput="calcular()" step="any" placeholder="0.00" class="w-full bg-slate-800 border-none rounded-xl p-3 text-white text-lg font-semibold outline-none focus:ring-2 focus:ring-yellow-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 mb-1 uppercase">Cantidad</label>
                        <input type="number" id="amount" oninput="calcular()" step="any" placeholder="Monto" class="w-full bg-slate-800 border-none rounded-xl p-3 text-white text-lg font-semibold outline-none focus:ring-2 focus:ring-yellow-500">
                    </div>
                </div>
            </div>
        </section>

        <section id="results" class="hidden space-y-3">
            <div id="statusBadge" class="text-center font-black text-[11px] uppercase tracking-[0.2em] py-1 rounded-t-xl"></div>
            <div class="bg-yellow-500 text-slate-900 p-6 rounded-b-3xl shadow-lg text-center">
                <p id="labelFinal" class="text-[10px] font-black uppercase opacity-70 mb-1"></p>
                <h2 id="finalPriceDisplay" class="text-4xl font-black tracking-tighter leading-none mb-4"></h2>
                <div class="pt-4 border-t border-slate-900/20">
                    <p class="text-[10px] font-black uppercase opacity-70 mb-1">Total de la Operación</p>
                    <h2 id="totalToClient" class="text-3xl font-black tracking-tighter"></h2>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="glass-card p-4 rounded-2xl accent-border">
                    <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Tu Ganancia (1%)</p>
                    <p id="profitDisplay" class="text-emerald-400 font-black text-xl"></p>
                </div>
                <div class="glass-card p-4 rounded-2xl border-l-4 border-red-500">
                    <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Tarifa Operativa</p>
                    <p id="feeDisplay" class="text-red-400 font-black text-xl"></p>
                </div>
            </div>
        </section>
    </main>

    <script>
        function calcular() {
            const spot = parseFloat(document.getElementById('spotPrice').value);
            const amount = parseFloat(document.getElementById('amount').value);
            const currency = document.getElementById('currency').value;
            const results = document.getElementById('results');
            const statusBadge = document.getElementById('statusBadge');

            if (!spot || !amount || spot <= 0 || amount <= 0) {
                results.classList.add('hidden');
                return;
            }

            results.classList.remove('hidden');
            const platformFeeRate = 0.009;
            const myProfitRate = 0.01;
            let finalUnitPrice = 0;
            let totalLiquidacion = 0;

            if (currency === 'BRL' || currency === 'VES') {
                statusBadge.innerText = "Operación: Venta de USDT";
                statusBadge.className = "text-center font-black text-[11px] uppercase tracking-[0.2em] py-1 rounded-t-xl bg-blue-900 text-blue-200";
                finalUnitPrice = spot * (1 + platformFeeRate + myProfitRate);
                const usdtEntregados = amount / finalUnitPrice;
                document.getElementById('labelFinal').innerText = "Precio de venta sugerido";
                document.getElementById('totalToClient').innerText = `${usdtEntregados.toFixed(2)} USDT`;
            } else {
                statusBadge.innerText = "Operación: Compra de USDT";
                statusBadge.className = "text-center font-black text-[11px] uppercase tracking-[0.2em] py-1 rounded-t-xl bg-emerald-900 text-emerald-200";
                finalUnitPrice = spot * (1 - platformFeeRate - myProfitRate);
                totalLiquidacion = amount * finalUnitPrice;
                document.getElementById('labelFinal').innerText = "Precio de compra sugerido";
                document.getElementById('totalToClient').innerText = `${totalLiquidacion.toLocaleString(undefined, {minimumFractionDigits: 2})} en Efectivo`;
            }

            document.getElementById('finalPriceDisplay').innerText = finalUnitPrice.toFixed(4);
            document.getElementById('profitDisplay').innerText = `$${((spot * myProfitRate) * amount).toFixed(2)}`;
            document.getElementById('feeDisplay').innerText = `$${((spot * platformFeeRate) * amount).toFixed(2)}`;
        }
    </script>
</body>
</html>
